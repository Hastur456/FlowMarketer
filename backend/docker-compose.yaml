version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: backend_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fastapi:
    build: .
    container_name: backend_fastapi
    develop:
      watch:
        - action: sync
          path: ./        
          target: /app    
          ignore:
            - venv/
        - action: rebuild
          path: requirements.txt
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app 
    environment:
      - PYTHONUNBUFFERED=1  # Для корректных выводов логов в реальном времени
    networks:
      - backend_network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  redis:
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - ./redis_data:/data
    networks:
      - backend_network

volumes:
  postgres_data:
  redis_data:
    driver: local

networks:
  backend_network:
    driver: bridge
